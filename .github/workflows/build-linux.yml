name: Build Linux

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CC: clang-19
      CXX: clang++-19

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        persist-credentials: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libhwloc-dev \
          libuv1-dev \
          libssl-dev \
          make \
          cmake

    - name: Install Clang 19
      run: |
        sudo apt-get install -y clang-19

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19
        make -j$(nproc)
