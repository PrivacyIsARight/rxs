name: "CodeQL"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
         - language: actions
           build-mode: none
         - language: c-cpp
           build-mode: manual
    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        persist-credentials: false

    - name: Install Dependencies and GCC 14
      if: matrix.language == 'c-cpp'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++-14 \
          gcc-14 \
          libhwloc-dev \
          libuv1-dev \
          libssl-dev \
          make \
          cmake
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
          --slave /usr/bin/g++ g++ /usr/bin/g++-14

    - name: Initialize CodeQL
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Create CodeQL trap cache directories
      if: matrix.language == 'c-cpp'
      run: mkdir -p "${{ runner.temp }}/trapCaches/cpp/tarballs"

    - name: Manual Build
      if: matrix.language == 'c-cpp'
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
      with:
        category: "/language:${{matrix.language}}"
